<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>波斯铁卫 — 塔防</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#080b12;font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:linear-gradient(180deg,#1c2430,#10151d);color:#eadfcb;font-size:14px;border-bottom:1px solid #394457;box-shadow:0 8px 20px rgba(0,0,0,.28);flex-shrink:0;min-height:46px;z-index:10}
.tb-item{display:flex;align-items:center;gap:6px;padding:3px 8px;border:1px solid rgba(255,255,255,.06);border-radius:6px;background:rgba(255,255,255,.035)}
.tb-item .label{color:#a59680;font-size:11px}
.tb-item .value{font-weight:bold;font-size:15px}
#hp-val{color:#e85555}
#gold-val{color:#f5c542}
#wave-val{color:#64b5f6}
#sp-val{color:#81c784}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 38%,#24303a 0,#10151d 48%,#070a0f 100%)}
#canvas-wrap::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;background:
  radial-gradient(circle at 50% 45%,rgba(255,235,190,0.04),rgba(0,0,0,0) 38%),
  linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px),
  linear-gradient(0deg,rgba(0,0,0,0.16),rgba(0,0,0,0) 18%,rgba(0,0,0,0) 72%,rgba(0,0,0,0.22));
background-size:auto,96px 96px,auto;mix-blend-mode:screen}
canvas{display:block;width:100%;height:100%;image-rendering:auto;cursor:crosshair}
#bottom-bar{display:flex;align-items:center;padding:8px 10px;background:linear-gradient(0deg,#171d26,#0f141c);border-top:1px solid #394457;box-shadow:0 -8px 20px rgba(0,0,0,.25);flex-shrink:0;min-height:62px;gap:6px;z-index:10;overflow-x:auto;overflow-y:hidden}
.tower-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:74px;height:50px;border:1px solid #435061;border-radius:7px;background:linear-gradient(145deg,#273240,#161c25);color:#e3d6be;font-size:10px;cursor:pointer;flex-shrink:0;transition:transform .12s,border-color .15s,box-shadow .15s,background .15s;padding:3px 8px;gap:1px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.tower-btn:hover{border-color:#8ca3b8;background:linear-gradient(145deg,#314052,#19202a);box-shadow:0 0 14px rgba(100,181,246,.18),inset 0 1px 0 rgba(255,255,255,.08)}
.tower-btn:active{transform:scale(.95)}
.tower-btn.selected{border-color:#f5c542;background:linear-gradient(145deg,#3d3220,#221f18);box-shadow:0 0 16px rgba(245,197,66,.35),inset 0 0 0 1px rgba(245,197,66,.18)}
.tower-btn .cost{color:#f5c542;font-size:11px;font-weight:bold}
.tower-btn .tname{font-size:10px}
.tower-btn .keyhint{color:#817869;font-size:9px}
#wave-btn{min-width:86px;height:50px;border:1px solid #3f9a5b;border-radius:7px;background:linear-gradient(145deg,#236139,#173a27);color:#a8e6b2;font-size:12px;font-weight:bold;cursor:pointer;flex-shrink:0;transition:all .15s;margin-left:auto;box-shadow:0 0 14px rgba(58,138,78,.16)}
#wave-btn:hover{border-color:#66c384;background:linear-gradient(145deg,#2c7044,#1c4630)}
#wave-btn:disabled{opacity:.4;cursor:not-allowed}
#militia-btn{min-width:58px;height:50px;border:1px solid #876044;border-radius:7px;background:linear-gradient(145deg,#49311f,#2a1d16);color:#f0c39b;font-size:10px;cursor:pointer;flex-shrink:0;text-align:center;padding:3px 6px}
#militia-btn:disabled{opacity:.4;cursor:not-allowed}
#militia-btn .sp{color:#81c784;font-size:11px}
#skill-btn{min-width:54px;height:50px;border:1px solid #4f6d8a;border-radius:7px;background:linear-gradient(145deg,#22364c,#172434);color:#8fd4ff;font-size:9px;cursor:pointer;flex-shrink:0;text-align:center;padding:3px 5px}
#skill-btn:disabled{opacity:.4;cursor:not-allowed}
#skill-btn .cd{color:#e85555;font-size:8px}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;font-weight:bold;text-shadow:0 2px 10px rgba(0,0,0,.9);padding:8px 14px;border-radius:7px;background:rgba(12,16,22,.72);border:1px solid rgba(255,255,255,.12);pointer-events:none;opacity:0;transition:opacity .3s;z-index:20}
#toast.show{opacity:1}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30}
#overlay.show{display:flex}
#overlay h2{font-size:28px;margin-bottom:10px}
#overlay p{font-size:16px;color:#c0b8a0;margin-bottom:20px}
#overlay button{padding:12px 36px;font-size:16px;border:1px solid #5a5a8e;border-radius:8px;background:#1a1a3e;color:#fff;cursor:pointer}
#overlay button:hover{background:#2a2a5e}
#tower-panel{position:absolute;padding:10px 12px;background:rgba(13,17,24,.95);border:1px solid #566171;border-radius:8px;color:#e8e0d0;font-size:12px;display:none;z-index:15;pointer-events:auto;min-width:172px;box-shadow:0 12px 28px rgba(0,0,0,.45)}
#tower-panel .tp-name{font-size:14px;font-weight:bold;color:#f5c542}
#tower-panel .tp-lv{color:#aaa;font-size:11px}
#tower-panel .tp-btn{display:inline-block;margin:4px 4px 0 0;padding:5px 12px;border:1px solid #4a4a7e;border-radius:4px;background:#1e1e42;color:#fff;font-size:11px;cursor:pointer}
#tower-panel .tp-btn:hover{background:#2e2e5e}
#tower-panel .tp-btn.upgrade{color:#f5c542;border-color:#5a4a1e}
#tower-panel .tp-btn.sell{color:#e88080;border-color:#5a2a2a}
.tp-stat-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#b0a898}
.tp-stat-label{color:#8a7e6e}
.tp-stat-val{color:#e8dcc8;min-width:30px;text-align:right}
.tp-stat-next{color:#f5c542;min-width:30px;text-align:right}
.tp-stat-arrow{color:#5a4a2e;margin:0 3px}.missile-bar-wrap{display:inline-flex;align-items:center;gap:4px;margin-left:4px}
.missile-bar-track{width:44px;height:6px;background:#1e1e3e;border:1px solid #3a3a6e;border-radius:3px;overflow:hidden;position:relative}
.missile-bar-fill{height:100%;border-radius:2px;transition:width .15s;background:linear-gradient(90deg,#ff8844,#ffcc44)}
.missile-bar-fill.ready{background:linear-gradient(90deg,#ff6644,#ff4444);box-shadow:0 0 6px #ff4444}
.missile-num{color:#ff6644;font-weight:bold;font-size:13px;min-width:12px;text-align:center}
.missile-num.empty{color:#665}
::-webkit-scrollbar{height:2px}
::-webkit-scrollbar-track{background:#0d0d1a}
::-webkit-scrollbar-thumb{background:#3a3a5e}
/* ── Settings ── */
#settings-btn{min-width:40px;height:50px;border:1px solid #435061;border-radius:7px;background:linear-gradient(145deg,#273240,#161c25);color:#d0c8b0;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
#settings-btn:hover{border-color:#8ca3b8;background:linear-gradient(145deg,#314052,#19202a)}
#settings-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,17,24,.97);border:1px solid #566171;border-radius:10px;padding:24px 32px;z-index:40;display:none;flex-direction:column;align-items:stretch;min-width:260px;box-shadow:0 20px 50px rgba(0,0,0,.62)}
#settings-panel.show{display:flex}
#settings-panel h3{color:#e0d8c8;font-size:18px;text-align:center;margin-bottom:16px;border-bottom:1px solid #3a3a6e;padding-bottom:10px}
.st-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #222248}
.st-row:last-child{border-bottom:none}
.st-label{color:#b0a898;font-size:14px}
.st-btn{padding:6px 18px;border:1px solid #4a4a7e;border-radius:6px;background:#1e1e42;color:#e0d8c8;font-size:13px;cursor:pointer;transition:all .12s}
.st-btn:hover{background:#2a2a5e;border-color:#6a6aae}
.st-btn.danger:hover{border-color:#e85555;color:#e85555}
.st-btn.success:hover{border-color:#81c784;color:#81c784}
.st-toggle{position:relative;width:48px;height:24px;background:#2a2a3e;border-radius:12px;cursor:pointer;transition:all .2s;flex-shrink:0}
.st-toggle.on{background:#2a6a3e}
.st-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#888;border-radius:50%;transition:all .2s}
.st-toggle.on::after{left:26px;background:#81c784}
.st-vol-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.st-vol-wrap input[type=range]{width:90px;height:4px;-webkit-appearance:none;appearance:none;background:#2a2a3e;border-radius:2px;outline:none}
.st-vol-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#c0b8a0;border-radius:50%;cursor:pointer}
.st-vol-wrap input[type=range]::-moz-range-thumb{width:14px;height:14px;background:#c0b8a0;border-radius:50%;border:none;cursor:pointer}
.st-vol-num{color:#c0b8a0;font-size:12px;min-width:28px;text-align:right}
#st-close{position:absolute;top:8px;right:12px;background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px}
#st-close:hover{color:#e0d8c8}
@media(max-width:480px){
  .tower-btn{min-width:50px;height:42px;font-size:9px}
  #top-bar{font-size:12px;padding:4px 8px;min-height:36px}
  .tb-item .value{font-size:13px}
  #bottom-bar{min-height:48px;padding:4px}
  #wave-btn{min-width:60px;height:42px;font-size:11px}
  #settings-btn{min-width:30px;height:42px;font-size:14px}
  #settings-panel{min-width:220px;padding:18px 20px}
}
</style>

<body>
<div id="app">
  <div id="top-bar">
    <div class="tb-item"><span class="label">❤️ 核心</span><span class="value" id="hp-val">15/15</span></div>
    <div class="tb-item"><span class="label">💰 资金</span><span class="value" id="gold-val">$500</span></div>
    <div class="tb-item"><span class="label">🌊 波次</span><span class="value" id="wave-val">0/50</span></div>
    <div class="tb-item"><span class="label">⚡ 支援</span><span class="value" id="sp-val">0</span></div>
    <div class="tb-item missile-bar-wrap">
      <span class="label">🚀</span>
      <div class="missile-bar-track"><div class="missile-bar-fill" id="missile-fill" style="width:0%"></div></div>
      <span class="missile-num empty" id="missile-num">0</span>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="tower-panel"></div>
    <div id="toast"></div>
    <div id="overlay">
      <h2 id="ol-title"></h2>
      <p id="ol-desc"></p>
      <button id="ol-btn">重新开始</button>
    </div>
    <div id="settings-panel">
      <button id="st-close">✕</button>
      <h3>⚙️ 设置</h3>
      <div class="st-row"><span class="st-label">🔄 重玩</span><button class="st-btn danger" id="st-restart">重新开始</button></div>
      <div class="st-row"><span class="st-label">💾 存盘</span><button class="st-btn" id="st-save">保存游戏</button></div>
      <div class="st-row"><span class="st-label">📂 读取</span><button class="st-btn" id="st-load">读取存档</button></div>
      <div class="st-row"><span class="st-label">🔊 音效</span><div class="st-toggle on" id="st-sfx"></div></div>
      <div class="st-row"><span class="st-label">🎵 音量</span><div class="st-vol-wrap"><input type="range" id="st-volume" min="0" max="100" value="80"><span class="st-vol-num" id="st-vol-num">80%</span></div></div>
    </div>
  </div>
  <div id="bottom-bar">
    <div class="tower-btn" data-tower="0"><span class="tname">高射机枪</span><span class="cost">$100</span><span class="keyhint">[1]</span></div>
    <div class="tower-btn" data-tower="1"><span class="tname">防空导弹</span><span class="cost">$200</span><span class="keyhint">[2]</span></div>
    <div class="tower-btn" data-tower="2"><span class="tname">电子干扰</span><span class="cost">$150</span><span class="keyhint">[3]</span></div>
    <button id="militia-btn">民兵<br><span class="sp">⚡50</span></button>
    <button id="skill-btn">侦察<br>无人机</button>
    <button id="wave-btn" disabled>▶ 开始</button>
    <button id="settings-btn">⚙️</button>
  </div>
</div>
<script>
// ============================================================
//  《波斯铁卫》— HTML5 塔防游戏
//  虚构背景：美以联军进攻伊朗，玩家扮演革命卫队指挥官
// ============================================================

// ---- Constants ----
const W = 1200, H = 720;
const TOWER_TYPES = [
  { id:'aa', name:'高射机枪', cost:100, desc:'高射速、低伤害，对低空目标有效',
    dmg:[10,14,20,28], dmgAir:[10,10,15,22], range:[100,110,122,136], cd:[25,23,20,18], color:'#c2b280', hitAir:true, hitGround:true, groundOnly:false,
    shape:'rect', upgrades:[125,300,550], sellRatio:.5 },
  { id:'sam', name:'防空导弹', cost:200, desc:'高伤害、慢射速，导弹拦截优先',
    dmg:[60,90,132,192], range:[130,140,152,164], cd:[58,52,46,41], color:'#2a5c8e', hitAir:true, hitGround:false, groundOnly:false,
    shape:'diamond', upgrades:[200,450,850], sellRatio:.5 },
  { id:'jammer', name:'电子干扰', cost:150, desc:'减速周围敌人，揭示隐形单位',
    dmg:[0,0,0,0], range:[105,113,127,144], cd:[70,64,58,52], color:'#4b5320', hitAir:true, hitGround:true, groundOnly:false,
    shape:'hex', upgrades:[150,375,700], sellRatio:.5, slow:[.36,.47,.57,.70] },
];
const ENEMY_TYPES = [
  { id:'drone', name:'无人机群', hp:20, speed:2.54, reward:5, size:8, color:'#a0a0c0', armor:0, flying:true, stealth:false },
  { id:'ifv', name:'步兵战车', hp:80, speed:1.59, reward:8, size:10, color:'#6b8e6b', armor:.15, flying:false, stealth:false },
  { id:'missile', name:'巡航导弹', hp:30, speed:3.49, reward:6, size:7, color:'#e8a040', armor:0, flying:true, stealth:false },
  { id:'suicide', name:'自爆无人机', hp:15, speed:4.44, reward:4, size:7, color:'#d05050', armor:0, flying:true, stealth:false, suicide:true },
  { id:'f16', name:'F-16', hp:200, speed:1.43, reward:15, size:12, color:'#8090b0', armor:.25, flying:true, stealth:false },
  { id:'tomahawk', name:'战斧导弹', hp:50, speed:3.18, reward:7, size:7, color:'#d0a060', armor:0, flying:true, stealth:false },
  { id:'stealth', name:'隐身战机', hp:350, speed:1.90, reward:30, size:13, color:'#4a4a6a', armor:.3, flying:true, stealth:true },
];

// ---- Game State ----
const G = {
  gold: 500, coreHP: 15, maxCoreHP: 15, wave: 0, sp: 0,
  phase: 'idle', // idle | playing | won | lost
  towers: [], enemies: [], projs: [], particles: [], texts: [],
  slots: [], selectedTower: null, pendingType: -1,
  spawnQueue: [], spawnIndex: 0, spawnTimer: 0, waveInProgress: false, allSpawned: false,
  reconCD: 0, reconMaxCD: 600, reconDrones: [],
  bombardMissiles: [], // 基地来袭导弹
  frame: 0, goldEarned: 0, kills: 0,
  // 德黑兰反击飞弹系统
  missileCharge: 0,    // 当前充能值
  missileCost: 20,     // 每20点充能转1发飞弹（从5→20，速度除4）
  missileReady: 0,     // 已充好的飞弹数
  tehranMissiles: [],  // 已发射的飞弹
  bases: {},           // {dir: hp} 每个基地2血
  cursorX: -999, cursorY: -999, // 鼠标位置（用于AoE预览圈）
  // 双击检测
  _lastClickTower: null, _lastClickTime: 0,
  _lastRightClickTower: null, _lastRightClickTime: 0,
  _confirmExit: false,
};
let ctx, canvas, tpPanel, toastEl, overlayEl, olTitle, olDesc, olBtn;

// ---- Map / Routes ----
// 德黑兰在陆地正中 — 两矩形嵌套，入口长直线，间距100px
const CORE_X = 600, CORE_Y = 360;
const ROUTES = [
  // 西路 — 外矩形，从左到右沿顶边直线入场
  { id:'West', color:'#4488cc', waypoints:[
    {x:0,y:80},{x:900,y:80},{x:900,y:640},
    {x:250,y:640},{x:250,y:360},{x:600,y:360}
  ]},
  // 南路 — 内矩形，从右到左沿底边直线入场
  { id:'South', color:'#44cc66', waypoints:[
    {x:1200,y:540},{x:350,y:540},{x:350,y:180},
    {x:800,y:180},{x:800,y:360},{x:600,y:360}
  ]},
];

// 美军军事基地位置（地图边缘东南西北）
const BASE_POSITIONS = [
  {x:0,   y:360, dir:'西'},   // West
  {x:1200,y:360, dir:'东'},   // East
  {x:600, y:0,   dir:'北'},   // North
  {x:600, y:720, dir:'南'},   // South
];

// Tower slots — 沿路中间段等距布点，转角对角线各1个
function initSlots() {
  G.slots = [];
  const S = [];
  const seen = new Set();

  function add(x, y) {
    const rx = Math.round(x), ry = Math.round(y);
    const k = `${rx},${ry}`;
    if (seen.has(k)) return;
    // 避免24×24方块叠在一起
    for (const es of S) {
      if (Math.abs(es.x - rx) < 24 && Math.abs(es.y - ry) < 24
          && Math.hypot(es.x - rx, es.y - ry) < 24) {
        return;
      }
    }
    // 避免方块压到任意兵线的24px宽线
    for (const route of ROUTES) {
      const pts = route.waypoints;
      for (let i = 0; i < pts.length - 1; i++) {
        const ax = pts[i].x, ay = pts[i].y;
        const bx = pts[i+1].x, by = pts[i+1].y;
        const dx = bx - ax, dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) continue;
        let t = ((rx - ax) * dx + (ry - ay) * dy) / lenSq;
        t = t < 0 ? 0 : t > 1 ? 1 : t;
        const d = Math.hypot(rx - (ax + dx * t), ry - (ay + dy * t));
        if (d < 24) return; // 兵线半宽12 + 方块半宽12
      }
    }
    seen.add(k);
    S.push({x: rx, y: ry});
  }

  for (const route of ROUTES) {
    const pts = route.waypoints;

    // ── 路段中间（s=1..steps-1，避开两端） ──
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i+1];
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      if (len < 1) continue;
      const nx = -dy / len, ny = dx / len;
      const steps = Math.max(1, Math.round(len / 80));
      for (let s = 1; s < steps; s++) {
        const t = s / steps;
        const px = a.x + dx * t, py = a.y + dy * t;
        add(px + nx * 26, py + ny * 26);
        add(px - nx * 26, py - ny * 26);
      }
    }

    // ── 转角：只有对角线上2个（内角 + 外角） ──
    for (let i = 1; i < pts.length - 1; i++) {
      const prev = pts[i-1], curr = pts[i], next = pts[i+1];
      const dx_in = curr.x - prev.x, dy_in = curr.y - prev.y;
      const dx_out = next.x - curr.x, dy_out = next.y - curr.y;
      const len_in = Math.hypot(dx_in, dy_in);
      const len_out = Math.hypot(dx_out, dy_out);
      if (len_in < 1 || len_out < 1) continue;
      const px_in = -dy_in / len_in, py_in = dx_in / len_in;
      const px_out = -dy_out / len_out, py_out = dx_out / len_out;
      // 内角 = P + perp_in*22 + perp_out*22
      add(curr.x + px_in*22 + px_out*22, curr.y + py_in*22 + py_out*22);
      // 外角 = P - perp_in*22 - perp_out*22
      add(curr.x - px_in*22 - px_out*22, curr.y - py_in*22 - py_out*22);
    }

    // ── 入口起点（第一航点） ──
    const a = pts[0], b = pts[1];
    const dx0 = b.x - a.x, dy0 = b.y - a.y;
    const len0 = Math.hypot(dx0, dy0);
    if (len0 > 1) {
      const nx = -dy0 / len0, ny = dx0 / len0;
      add(a.x + nx * 26, a.y + ny * 26);
      add(a.x - nx * 26, a.y - ny * 26);
    }
  }

  // 德黑兰附近
  add(CORE_X - 10, CORE_Y - 26);
  add(CORE_X - 10, CORE_Y + 26);

  // 只保留伊朗和也门范围内的炮塔点位
  const filtered = S.filter(p => isSlotAllowed(p.x, p.y));
  for (const p of filtered) G.slots.push({x: p.x, y: p.y, occupied: false});
}

function pointInPoly(x,y,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y;
    const xj=poly[j].x,yj=poly[j].y;
    if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}
function isSlotAllowed(x,y){
  for(const poly of ALLOWED_POLYS){
    if(pointInPoly(x,y,poly)) return true;
  }
  return false;
}

// ---- Utility ----
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function distSq(a,b){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy}
function lerp(a,b,t){return a+(b-a)*t}
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function hsvToRgb(h,s,v){let i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);switch(i%6){case 0:return[v,t,p];case 1:return[q,v,p];case 2:return[p,v,t];case 3:return[p,q,v];case 4:return[t,p,v];case 5:return[v,p,q]}return[0,0,0]}
function colorAlpha(c,a){
  if(c&&c[0]==='#'){
    const h=c.slice(1,7);
    const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  return c;
}
function compactAlive(arr, keep){
  let write=0;
  for(let read=0;read<arr.length;read++){
    const item=arr[read];
    if(keep(item)) arr[write++]=item;
  }
  arr.length=write;
}
function perfLoad(){
  return G.enemies.length + G.projs.length + G.particles.length * 0.25;
}
function emitParticle(x,y,vx,vy,life,color,size,extra){
  if(G.particles.length>=220 && !extra?.shockwave) return;
  const p={x,y,vx:vx||0,vy:vy||0,life,color,size:size||2};
  if(extra) Object.assign(p,extra);
  G.particles.push(p);
}
function emitBurst(x,y,count,color,sizeMin,sizeMax,life,spMin,spMax){
  const load=perfLoad();
  const scale=load>220?0.35:load>150?0.55:load>90?0.75:1;
  const n=Math.max(2,Math.round(count*scale));
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2),sp=rand(spMin,spMax);
    emitParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,life,color,rand(sizeMin,sizeMax));
  }
}

// ---- Enemy Class ----
class Enemy {
  constructor(type, routeIdx, hpMul) {
    const def = ENEMY_TYPES[type];
    this.type = type;
    this.name = def.name;
    this.maxHp = Math.round(def.hp * hpMul);
    this.hp = this.maxHp;
    this.baseSpeed = def.speed;
    this.speed = def.speed;
    // 击杀奖励：20~29波递减，30波后固定30波水平，无上限
    this.reward = Math.round(def.reward * 1.69 * (1 + (hpMul-1)*0.5));
    if (G.wave > 20) {
      const waveMul = G.wave >= 30 ? 30 : G.wave; // 30波后固定用30的乘数
      let mul = Math.max(0.01, 1.0 - 0.075 * (waveMul - 20));
      this.reward = Math.round(this.reward * mul);
    }
    this.size = def.size;
    this.color = def.color;
    this.armor = def.armor;
    this.flying = def.flying;
    this.stealth = def.stealth;
    this.suicide = def.suicide||false;
    this.routeIdx = routeIdx;
    this.wp = ROUTES[routeIdx].waypoints;
    this.wpIdx = 0;
    this.x = this.wp[0].x;
    this.y = this.wp[0].y;
    this.alive = true;
    this.reachedEnd = false;
    this.hitFlash = 0;
    this.slowTimer = 0;
    this.slowAmount = 0;
    this.angle = 0;
    this.revealed = false; // for stealth
  }
  update(dt) {
    if (!this.alive) return;
    // Slow
    if (this.slowTimer > 0) {
      this.slowTimer -= dt * 60;
      this.speed = this.baseSpeed * (1 - this.slowAmount);
    } else {
      this.speed = this.baseSpeed;
    }
    if (this.hitFlash > 0) this.hitFlash -= dt * 60;
    // Move toward next waypoint
    if (this.wpIdx >= this.wp.length) {
      this.reachedEnd = true;
      this.alive = false;
      return;
    }
    const target = this.wp[this.wpIdx];
    const dx = target.x - this.x;
    const dy = target.y - this.y;
    const moveSpeed = this.speed * 60 * dt;
    const arrive = moveSpeed + 2;
    const dSq = dx*dx + dy*dy;
    if (dSq < arrive * arrive) {
      this.x = target.x;
      this.y = target.y;
      this.wpIdx++;
    } else {
      const d = Math.sqrt(dSq);
      this.x += (dx/d) * moveSpeed;
      this.y += (dy/d) * moveSpeed;
    }
    this.angle = Math.atan2(dy, dx);
  }

    if (!this.alive) return;

    // Flying indicator: dashed altitude ring

      ctx.setLineDash([]);
    }else{

        ctx.lineTo(-s*0.8,s*0.7);
        ctx.lineTo(-s*1.1,s*0.3);
        ctx.lineTo(-s*1.1,-s*0.3);
        ctx.closePath(); ctx.fill();
        // Track wheels
        ctx.fillStyle = flash?'#fff':darken(c,30);
        for(let i=0;i<3;i++){
          const tx = -s*0.5 + i*0.5*s;
          ctx.beginPath(); ctx.arc(tx,-s*0.55,s*0.12,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(tx,s*0.55,s*0.12,0,Math.PI*2); ctx.fill();
        }
        // Turret
        ctx.fillStyle = flash?'#fff':c;
        ctx.beginPath();
        ctx.moveTo(-s*0.2,-s*0.5);
        ctx.lineTo(s*0.4,-s*0.5);
        ctx.lineTo(s*0.6,-s*0.1);
        ctx.lineTo(-s*0.2,s*0.1);
        ctx.closePath(); ctx.fill();
        // Cannon barrel (longer)
        ctx.fillStyle = flash?'#fff':darken(c,15);
        ctx.fillRect(s*0.35,-0.05*s,0.7*s,0.1*s);
        ctx.fillStyle = flash?'#fff':darken(c,30);
        ctx.fillRect(s*0.9,-0.08*s,0.2*s,0.16*s);
        // Armor plate detail
        ctx.fillStyle = flash?'#fff':darken(c,10);
        ctx.fillRect(-s*0.5,-s*0.4,0.3*s,0.04*s);
        ctx.fillRect(-s*0.5,0.3*s,0.3*s,0.04*s);
      }
    }
    ctx.restore();
    ctx.shadowBlur = 0;
    // Stealth indicator (if revealed)
    if (this.stealth) {
      ctx.strokeStyle = 'rgba(100,150,255,0.4)';
      ctx.setLineDash([3,3]);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(this.x,this.y,s+4,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    // Suicide glow override (subtle outer ring)
    if (this.suicide) {
      ctx.fillStyle = `rgba(255,50,50,${0.15+0.15*Math.sin(G.frame*0.1)})`;
      ctx.beginPath(); ctx.arc(this.x,this.y,s+3,0,Math.PI*2); ctx.fill();
    }
    // HP bar
    const hpR = this.hp/this.maxHp;
    if (hpR < 1) {
      const bw = s*2.5, bh = 3;
      const bx = this.x-bw/2, by = this.y-s-10;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx-1,by-1,bw+2,bh+2);
      ctx.fillStyle = hpR>.5?'#44cc44':hpR>.25?'#ddcc44':'#ee4444';
      if (hpR>.01) ctx.fillRect(bx,by,bw*hpR,bh);
    }
  }
}

// ---- Tower Class ----
class Tower {
  constructor(slotIdx, type) {
    const def = TOWER_TYPES[type];
    this.slotIdx = slotIdx;
    this.type = type;
    this.level = 0;
    this.x = G.slots[slotIdx].x;
    this.y = G.slots[slotIdx].y;
    this.name = def.name;
    this.cost = def.cost;
    this.color = def.color;
    this.shape = def.shape;
    this.hitAir = def.hitAir;
    this.hitGround = def.hitGround;
    this.groundOnly = def.groundOnly;
    this.upgradeCosts = def.upgrades;
    this.sellRatio = def.sellRatio;
    this.totalUpgradeCost = 0;
    this.target = null;
    this.cooldown = 0;
    this.angle = 0;
    this.animTimer = 0;
    this.lastTarget = null;
  }
  get dmg() { return TOWER_TYPES[this.type].dmg[this.level] || 0; }
  get dmgAir() { return TOWER_TYPES[this.type].dmgAir ? TOWER_TYPES[this.type].dmgAir[this.level] : this.dmg; }
  get range() { return TOWER_TYPES[this.type].range[this.level] || 0; }
  get cd() { return TOWER_TYPES[this.type].cd[this.level] || 30; }
  get slow() { return TOWER_TYPES[this.type].slow ? TOWER_TYPES[this.type].slow[this.level] : 0; }
  get splash() { return TOWER_TYPES[this.type].splash ? TOWER_TYPES[this.type].splash[this.level] : 0; }
  update(dt) {
    if (this.cooldown > 0) this.cooldown -= dt * 60;
    this.animTimer += dt;
    // Jammer: apply slow aura + reveal stealth — now handled in global pass for speed
    if (this.cooldown > 0 && this.type !== 2) return;
    // Frame-skip: towers only search for targets every 3 frames (huge perf win)
    if (G.frame % 3 !== (this.x % 3 + this.y % 3 + 3) % 3) return;
    const rangeSq = this.range * this.range;
    // Find target
    let target = null;
    if (this.type === 2) {
      // Jammer: cycle targeting, prefer unslowed enemies
      // Priority 1: not slowed and not last target
      for (const e of G.enemies) {
        if (!e.alive || e.reachedEnd || e.friendly) continue;
        if (distSq(this,e) > rangeSq) continue;
        const canHit = (e.flying && this.hitAir) || (!e.flying && this.hitGround);
        if (!canHit) continue;
        if (e.slowTimer <= 0 && e !== this.lastTarget) { target = e; break; }
      }
      // Priority 2: not slowed (any)
      if (!target) {
        for (const e of G.enemies) {
          if (!e.alive || e.reachedEnd || e.friendly) continue;
          if (distSq(this,e) > rangeSq) continue;
          const canHit = (e.flying && this.hitAir) || (!e.flying && this.hitGround);
          if (!canHit) continue;
          if (e.slowTimer <= 0) { target = e; break; }
        }
      }
      // Priority 3: any enemy in range
      if (!target) {
        for (const e of G.enemies) {
          if (!e.alive || e.reachedEnd || e.friendly) continue;
          if (distSq(this,e) > rangeSq) continue;
          const canHit = (e.flying && this.hitAir) || (!e.flying && this.hitGround);
          if (!canHit) continue;
          target = e; break;
        }
      }
    } else {
      // Standard focus-fire
      const locked = this.target;
      if (locked && locked.alive && !locked.reachedEnd) {
        const dSq = distSq(this, locked);
        if (dSq <= rangeSq) {
          const canHit = (locked.flying && this.hitAir) || (!locked.flying && this.hitGround);
          if (canHit) target = locked;
        }
      }
      if (!target) {
        let bestPri = -Infinity;
        for (const e of G.enemies) {
          if (!e.alive || e.reachedEnd || e.friendly) continue;
          const dSq = distSq(this, e);
          if (dSq > rangeSq) continue;
          const canHit = (e.flying && this.hitAir) || (!e.flying && this.hitGround);
          if (!canHit) continue;
          const pri = e.wpIdx * 1000 - dSq;
          if (pri > bestPri) { bestPri = pri; target = e; }
        }
      }
    }
    if (target) {
      this.target = target;
      this.angle = Math.atan2(target.y - this.y, target.x - this.x);
      if (this.cooldown <= 0) {
        this.cooldown = this.cd;
        if (this.type === 2) {
          // Jammer: fire slow projectile
          this.lastTarget = target;
          G.projs.push(new Projectile(this.x,this.y,target,this.dmg||1,this.color+'aa',this.splash,true,this.slow));
        } else {
          // Use dmgAir for flying targets if tower has separate air damage
          const fireDmg = (target.flying && TOWER_TYPES[this.type].dmgAir) ? this.dmgAir : this.dmg;
          G.projs.push(new Projectile(this.x,this.y,target,fireDmg,this.color+'cc',this.splash));
        }
      }
    }
  }
  remove() {
    this._removePending = true;
    G.slots[this.slotIdx].occupied = false;
  }
  draw(ctx) {
    const def = TOWER_TYPES[this.type];
    const s = 16;
    const body = this.level>0?lighten(this.color,this.level*16):this.color;
    const trim = this.level>0?'#ffd36a':'rgba(230,235,225,0.65)';
    // Reinforced base and ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.beginPath(); ctx.ellipse(this.x,this.y+5,s*1.45,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(18,22,24,0.9)';
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(this.x-s*1.08,this.y-s*0.82,s*2.16,s*1.64,5);
    ctx.fill(); ctx.stroke();
    // Range indicator (when hovered or selected)
    if (G.selectedTower === this) {
      ctx.fillStyle = 'rgba(245,197,66,0.045)';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.range,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(245,197,66,0.22)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([7,7]);
      ctx.beginPath(); ctx.arc(this.x,this.y,this.range,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = trim;
    ctx.lineWidth = 1.5;
    if (this.type === 0) {
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.roundRect(-s*0.9,-s*0.65,s*1.8,s*1.3,4);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = darken(this.color,32);
      ctx.fillRect(-s*1.0,-s*0.55,4,s*1.1);
      ctx.fillRect(s*0.72,-s*0.55,4,s*1.1);
      ctx.rotate(this.angle);
      ctx.fillStyle = '#20252a';
      ctx.beginPath(); ctx.arc(0,0,s*0.42,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = trim; ctx.stroke();
      ctx.fillStyle = '#d7d2c6';
      ctx.fillRect(s*0.15,-2.5,s*1.05,2.2);
      ctx.fillRect(s*0.15,1.2,s*1.05,2.2);
      ctx.fillStyle = '#f3d07a';
      ctx.fillRect(s*1.12,-3.3,5,1.8);
      ctx.fillRect(s*1.12,1.8,5,1.8);
    } else if (this.type === 1) {
      ctx.rotate(this.angle);
      ctx.fillStyle = darken(this.color,12);
      ctx.beginPath();
      ctx.moveTo(0,-s*1.15);
      ctx.lineTo(s*1.08,0);
      ctx.lineTo(0,s*1.15);
      ctx.lineTo(-s*1.08,0);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.roundRect(-s*0.55,-s*0.38,s*1.1,s*0.76,3); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#dfe8ea';
      ctx.fillRect(s*0.25,-2,s*1.15,4);
      ctx.fillStyle = '#ff8a42';
      ctx.beginPath(); ctx.arc(s*1.45,0,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillRect(-s*0.26,-s*0.18,s*0.34,s*0.36);
    } else if (this.type === 2) {
      ctx.fillStyle = body;
      ctx.beginPath();
      for(let i=0;i<6;i++){let a=Math.PI/3*i-Math.PI/6;ctx.lineTo(Math.cos(a)*s*1.08,Math.sin(a)*s*1.08)}
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = `rgba(120,220,150,${0.28+0.12*Math.sin(G.frame*0.05)})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0,0,s*0.72,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,s*1.45,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#ccf4c9';
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(this.animTimer*2)*s*0.8,Math.sin(this.animTimer*2)*s*0.8); ctx.stroke();
      ctx.fillStyle = '#b8ffb0';
      ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
    // Level stars — bigger, with glow
    if (this.level > 0) {
      const starY = this.y - s - 6;
      const starStart = this.x - (this.level-1)*6;
      for(let i=0;i<this.level;i++){
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('★', starStart + i*12, starY);
        ctx.shadowBlur = 0;
      }
      // Level badge circle
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.arc(this.x, starY-14, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Lv'+(this.level+1), this.x, starY-14);
      ctx.textBaseline = 'alphabetic';
    }
  }
}

function lighten(c,amt){
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(c,amt){
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// ---- Projectile Class ----
class Projectile {
  constructor(x,y,target,dmg,color,splash,isSlow,slowAmount){
    this.x=x;this.y=y;this.target=target;this.dmg=dmg;this.color=color;
    this.speed=6;this.alive=true;this.splash=splash||0;this.isSlow=isSlow||false;
    this.slowAmount=slowAmount||0;this.trail=[];
  }
  update(dt) {
    if(!this.alive)return;
    if(!this.target||!this.target.alive){this.alive=false;return;}
    const dx=this.target.x-this.x,dy=this.target.y-this.y;
    const hitRange=this.speed+this.target.size;
    const dSq=dx*dx+dy*dy;
    if(dSq<hitRange*hitRange){
      this.hit();
    }else{
      if(G.frame%2===0)this.trail.push({x:this.x,y:this.y,life:.3});
      if(this.trail.length>(this.isSlow?4:3))this.trail.shift();
      const d=Math.sqrt(dSq);
      this.x+=(dx/d)*this.speed;
      this.y+=(dy/d)*this.speed;
    }
  }
  hit(){
    this.alive=false;
    const t=this.target;
    if(!t||!t.alive)return;
    const dmg=this.dmg*(1-(t.armor||0));
    t.hp-=dmg;
    t.hitFlash=5;
    // Splash
    if(this.splash>0){
      const splashSq=this.splash*this.splash;
      for(const e of G.enemies){
        if(e===t||!e.alive)continue;
        if(distSq(this,e)<=splashSq){
          e.hp-=this.dmg*0.5*(1-(e.armor||0));
          e.hitFlash=4;
          if(e.hp<=0)killEnemy(e);
        }
      }
    }
    // Slow projectile (jammer)
    if(this.isSlow){
      t.slowTimer=90;
      t.slowAmount=Math.max(t.slowAmount||0,this.slowAmount);
      if(t.stealth)t.revealed=true;
    }
    if(t.hp<=0)killEnemy(t);
    // Impact particles
    const c=this.color;
    emitBurst(t.x,t.y,8,c,2,5,0.4,30,100);
    // Splash particles
    if(this.splash>0){
      emitBurst(t.x,t.y,12,'#ff8844',3,7,0.6,50,150);
    }
  }
  draw(ctx){
    if(!this.alive)return;
    if(this.trail.length>1){
      ctx.save();
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.shadowColor=this.color;
      ctx.shadowBlur=this.isSlow?7:4;
      ctx.strokeStyle=colorAlpha(this.color,this.isSlow?0.22:0.16);
      ctx.lineWidth=this.isSlow?2.6:1.6;
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x,this.trail[0].y);
      for(let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x,this.trail[i].y);
      ctx.lineTo(this.x,this.y);
      ctx.stroke();
      ctx.strokeStyle=colorAlpha('#ffffff',this.isSlow?0.24:0.18);
      ctx.lineWidth=0.8;
      ctx.stroke();
      ctx.restore();
    }
    // Projectile
    ctx.shadowColor=this.color;
    ctx.shadowBlur=this.isSlow?9:6;
    ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.isSlow?4:3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();ctx.arc(this.x-1,this.y-1,1.2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ---- Wave System ----
function generateWave(waveNum) {
  const entries=[];
  // Each wave: split enemies between West (route 0) and South (route 1)
  const droneCount=Math.min(3+waveNum,12); // 无人机上限12，避免后期太多
  entries.push({type:0,count:Math.ceil(droneCount/2),route:0,interval:15,delay:0});
  entries.push({type:0,count:Math.floor(droneCount/2),route:1,interval:15,delay:5});
  if(waveNum>=2){
    let n=1+Math.floor((waveNum-2)/3);
    entries.push({type:1,count:Math.ceil(Math.min(n,6)/2),route:0,interval:40,delay:30});
    entries.push({type:1,count:Math.floor(Math.min(n,6)/2),route:1,interval:40,delay:35});
  }
  if(waveNum>=3){
    let n=1+Math.floor((waveNum-3)/2);
    entries.push({type:2,count:Math.ceil(Math.min(n,8)/2),route:0,interval:25,delay:50});
    entries.push({type:2,count:Math.floor(Math.min(n,8)/2),route:1,interval:25,delay:55});
  }
  if(waveNum>=4){
    let n=1+Math.floor((waveNum-4)/2);
    entries.push({type:3,count:Math.ceil(Math.min(n,6)/2),route:0,interval:20,delay:70});
    entries.push({type:3,count:Math.floor(Math.min(n,6)/2),route:1,interval:20,delay:75});
  }
  if(waveNum>=6){
    let n=1+Math.floor((waveNum-6)/4);
    if(n>=1){entries.push({type:4,count:Math.ceil(Math.min(n,4)/2),route:0,interval:60,delay:90});}
    if(n>=2){entries.push({type:4,count:Math.floor(Math.min(n,4)/2),route:1,interval:60,delay:95});}
  }
  if(waveNum>=8){
    let n=1+Math.floor((waveNum-8)/3);
    entries.push({type:5,count:Math.ceil(Math.min(n,6)/2),route:0,interval:30,delay:100});
    entries.push({type:5,count:Math.floor(Math.min(n,6)/2),route:1,interval:30,delay:105});
  }
  if(waveNum%5===0){
    let n=1+Math.floor(waveNum/5);
    entries.push({type:6,count:Math.ceil(Math.min(n,4)/2),route:0,interval:80,delay:40});
    entries.push({type:6,count:Math.floor(Math.min(n,4)/2),route:1,interval:80,delay:45});
  }
  return entries;
}

function balanceWaveEntries(entries,waveNum){
  const desiredTotal = Math.round(10 + waveNum * 1.45 + Math.sqrt(waveNum) * 3);
  const maxTotal = 82;
  const budget = Math.min(maxTotal, desiredTotal);
  const rawTotal = entries.reduce((sum,e)=>sum+e.count,0);
  if(rawTotal <= budget) return entries;
  const scale = budget / rawTotal;
  let total = 0;
  for(const e of entries){
    e.count = Math.max(1, Math.round(e.count * scale));
    total += e.count;
  }
  while(total > budget){
    let biggest = null;
    for(const e of entries){
      if(e.count <= 1) continue;
      if(!biggest || e.count > biggest.count) biggest = e;
    }
    if(!biggest) break;
    biggest.count--;
    total--;
  }
  return entries;
}

function startWave(){
  if(G.waveInProgress||G.wave>=50)return;
  G.wave++;
  G.waveInProgress=true;
  G.spawnQueue=[];
  G.spawnIndex=0;
  G.allSpawned=false;
  const hpMul=(1+(G.wave-1)*0.105)*Math.pow(1.18,Math.floor(G.wave/10));
  const entries=generateWave(G.wave);
  const waveMult=1 + Math.min(1.15, G.wave * 0.018 + Math.floor(G.wave/10) * 0.08);
  const paceMul=G.wave>=30 ? 0.72 : G.wave>=20 ? 0.82 : 1;
  for(const e of entries){
    e.count = Math.max(1, Math.round(e.count * waveMult));
  }
  balanceWaveEntries(entries,G.wave);
  for(const e of entries){
    for(let i=0;i<e.count;i++){
      G.spawnQueue.push({type:e.type,route:e.route,delay:e.delay+i*Math.max(8,e.interval*paceMul),hpMul:hpMul});
    }
  }
  // Shuffle within each route group to mix entry points
  G.spawnQueue.sort((a,b)=>a.delay-b.delay);
  G.spawnTimer=0;
  document.getElementById('wave-btn').disabled=true;
  showToast(`🌊 第 ${G.wave} 波开始！`);
  updateHUD();
  // 触发基地轰炸（第6波起）
  triggerBaseBombardment(G.wave);
  // 音效
  sfxWaveStart();
  if(G.wave === 1) setTimeout(sfxPlayBGM, 500);
}

function updateWave(dt){
  if(!G.waveInProgress)return;
  G.spawnTimer+=dt*60;
  while(G.spawnIndex<G.spawnQueue.length&&G.spawnQueue[G.spawnIndex].delay<=G.spawnTimer){
    const e=G.spawnQueue[G.spawnIndex++];
    const enemy=new Enemy(e.type,e.route,e.hpMul);
    G.enemies.push(enemy);
  }
  if(G.spawnIndex>=G.spawnQueue.length)G.allSpawned=true;
  // Check wave complete
  if(G.allSpawned){
    const alive=G.enemies.some(e=>e.alive);
    if(!alive){
      G.waveInProgress=false;
      G.allSpawned=false;
      let waveGold;
      // 20波前保持原始奖金
      if(G.wave<20){
        waveGold=30+G.wave*5;
      }else if(G.wave<30){
        waveGold=80+(G.wave-20)*3; // 20~29关: 80→107, +3/关
      }else if(G.wave<40){
        waveGold=110+(G.wave-30)*2; // 30~39关: 110→128, +2/关
      }else{
        waveGold=130+(G.wave-40)*1; // 40~49关: 130→139, +1/关
      }
      // 20波后削减奖金，自然累计无上限
      if(G.wave>20){
        if(G.wave<=25)      waveGold=50-(G.wave-20)*4;  // 21~25: 50→30
        else if(G.wave<=30) waveGold=30-(G.wave-25)*3;  // 26~30: 30→15
        else if(G.wave<=35) waveGold=10;                // 31~35: 10
        else if(G.wave<=40) waveGold=8;                 // 36~40: 8
        else                waveGold=5;                 // 41~49: 5
      }
      // 第50关固定
      if(G.wave===50) waveGold=140;
      // 20波后奖金提升20%
      if(G.wave>20) waveGold=Math.round(waveGold*1.2);
      G.gold+=waveGold;
      G.sp += 10;  // 支援不设上限
      // 基地回血：连续3波不被攻击则回满
      for(const key of Object.keys(G.bases)){
        const b = G.bases[key];
        if(b.hp >= b.maxHp) { b.wavesSinceHit = 0; continue; }
        if(b.hp > 0){
          b.wavesSinceHit++;
          if(b.wavesSinceHit >= 3){
            b.hp = b.maxHp;
            b.wavesSinceHit = 0;
            showToast(`🔋 ${key}方基地已回满血`);
          }
        }
      }
      showToast(`✅ 第 ${G.wave} 波完成！+$${waveGold}`);
      sfxCoin();
      if(G.wave>=50){
        G.phase='won';
        sfxVictory();
        showOverlay('🎉 胜利！','你成功保卫了波斯铁卫的核心！<br>击杀: '+G.kills+' | 总收益: $'+G.goldEarned+' | 剩余核心: '+G.coreHP,restartGame);
      }
      document.getElementById('wave-btn').disabled=false;
      updateHUD();
    }
  }
}

function killEnemy(e){
  if(!e.alive)return;
  e.alive=false;
  G.gold+=e.reward;
  G.kills++;
  G.goldEarned+=e.reward;
  // 击杀充能：每次击杀得1点，攒够 missileCost 转1发飞弹
  G.missileCharge++;
  if(G.missileCharge >= G.missileCost){
    G.missileCharge -= G.missileCost;
    G.missileReady++;
  }
  // Death particles
  emitBurst(e.x,e.y,10,e.color,2,5,0.5,30,120);
  // HUD is refreshed on a fixed cadence in update() to avoid kill-spike DOM churn.
}

// ---- Support Systems ----
function summonMilitia(){
  if(G.sp<50)return;
  G.sp-=50;
  // 每条兵线各3个，从核心出发逆向行驶
  for(let ri=0;ri<ROUTES.length;ri++){
    for(let i=0;i<3;i++){
      const e=new Enemy(1,ri,0.6);
      e.x=CORE_X+rand(-30,30);
      e.y=CORE_Y+rand(-30,30);
      e.alive=true;
      e.wpIdx=0;
      e.wp=ROUTES[ri].waypoints.slice().reverse();
      e.hp=60;e.maxHp=60;e.baseSpeed=2.38;e.speed=2.38;e.reward=0;
      e.color='#88cc88';e.friendly=true;
      G.enemies.push(e);
    }
  }
  showToast('⚡ 民兵已召唤！');
  updateHUD();
}

function useRecon(){
  if(G.reconCD>0)return;
  G.reconCD=G.reconMaxCD;
  let count=0;
  for(let ri=0;ri<ROUTES.length;ri++){
    const r=ROUTES[ri];
    const wps=r.waypoints;
    const drone={x:wps[wps.length-1].x,y:wps[wps.length-1].y,alive:true,
      wp:wps.slice().reverse(),wpIdx:0,speed:2.5,detectRange:130,routeIdx:ri};
    drone.update=function(dt){
      if(!this.alive)return;
      if(this.wpIdx>=this.wp.length){this.alive=false;return;}
      const t=this.wp[this.wpIdx];
      const dx=t.x-this.x,dy=t.y-this.y;
      const ms=this.speed*60*dt;
      const arrive=ms+2;
      const dSq=dx*dx+dy*dy;
      if(dSq<arrive*arrive){this.x=t.x;this.y=t.y;this.wpIdx++;}
      else{const d=Math.sqrt(dSq);this.x+=dx/d*ms;this.y+=dy/d*ms;}
      // Reveal stealth in range
      const detectSq=this.detectRange*this.detectRange;
      for(const e of G.enemies){
        if(e.stealth&&!e.revealed&&distSq(e,this)<detectSq)
          e.revealed=true;
      }
      // Collision: drone rams ANY flying enemy — one drone one kill
      for(const e of G.enemies){
        if(!e.alive||!e.flying)continue;
        const hit=e.size+8;
        if(distSq(e,this)<hit*hit){
          e.hp=0;e.hitFlash=10;
          this.alive=false;
          sfxDroneKill();
          emitBurst(this.x,this.y,12,'#66ccff',2,5,0.5,30,120);
          if(e.hp<=0)killEnemy(e);
          break;
        }
      }
    };
    drone.draw=function(ctx){
      if(!this.alive)return;
      // Detection circle
      ctx.strokeStyle='rgba(100,200,255,0.12)';
      ctx.lineWidth=1;ctx.setLineDash([4,6]);
      ctx.beginPath();ctx.arc(this.x,this.y,this.detectRange,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
      // Drone body
      ctx.fillStyle='#66ccff';ctx.shadowColor='#66ccff';ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(this.x,this.y,5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();
    };
    G.reconDrones.push(drone);
    count++;
  }
  showToast(`🔍 ${count}架侦察无人机出动！`);
  updateHUD();
}

// ---- Base Bombardment (美军基地导弹突袭) ----
function triggerBaseBombardment(waveNum) {
  if (waveNum < 6) return;
  // 检查是否所有基地都被摧毁 — 被摧毁就不能再发射导弹
  const aliveBases = BASE_POSITIONS.filter(bp => (G.bases[bp.dir]?.hp||0) > 0);
  if (aliveBases.length === 0) return;
  // 数量：第6波起每波2发，每5波+2发，不超过炮塔总数-2
  const wavesSince6 = waveNum - 6;
  const growthCycles = Math.floor(wavesSince6 / 5);
  let count = 2 + growthCycles * 2;
  const aliveTowers = G.towers.filter(t => !t._removePending);
  const maxMiss = Math.max(0, aliveTowers.length - 2);
  count = Math.min(count, maxMiss);
  if (count <= 0) return;
  // 警告
  showToast('⚠ 敌方基地发射导弹突袭我方防御设施，请做好准备！');
  // 1.5秒后开始发射
  setTimeout(() => {
    let fired = 0;
    const iv = setInterval(() => {
      if (fired >= count || G.phase === 'lost' || G.phase === 'won') {
        clearInterval(iv); return;
      }
      const alive = G.towers.filter(t => !t._removePending);
      if (alive.length === 0) { clearInterval(iv); return; }
      const target = alive[Math.floor(Math.random() * alive.length)];
      // 只从还活着的基地发射
      const aliveBasesNow = BASE_POSITIONS.filter(bp => (G.bases[bp.dir]?.hp||0) > 0);
      if (aliveBasesNow.length === 0) { clearInterval(iv); return; }
      const base = aliveBasesNow[fired % aliveBasesNow.length];
      G.bombardMissiles.push({
        x: base.x, y: base.y,
        targetX: target.x, targetY: target.y,
        targetTower: target, speed: 8, alive: true,
        trail: [], dir: base.dir,
      });
      fired++;
    }, 800);
  }, 1500);
}

// ---- Core Damage ----
function damageCore(amount){
  G.coreHP-=amount||1;
  if(G.coreHP<=0){
    G.coreHP=0;
    G.phase='lost';
    sfxGameOver();
    showOverlay('💀 失守！','核心已被摧毁。',restartGame);
  }
  updateHUD();
  // Screen shake
  // (subtle)
}

// ---- UI Functions ----
function showToast(msg){
  toastEl.textContent=msg;
  toastEl.className='show';
  clearTimeout(toastEl._t);
  toastEl._t=setTimeout(()=>toastEl.className='',1500);
}

function showOverlay(title,desc,btnCb){
  overlayEl.className='show';
  olTitle.textContent=title;
  olDesc.innerHTML=desc;
  olBtn.onclick=btnCb;
}

function hideOverlay(){overlayEl.className='';}

function restartGame(){
  hideOverlay();
  initGame();
}

function updateHUD(){
  document.getElementById('hp-val').textContent=`${G.coreHP}/${G.maxCoreHP}`;
  document.getElementById('gold-val').textContent=`$${G.gold}`;
  document.getElementById('wave-val').textContent=`${G.wave}/50`;
  document.getElementById('sp-val').textContent=`${G.sp}`;
  // 飞弹进度条
  const chargePct = Math.min(100, (G.missileCharge / G.missileCost) * 100);
  const fill = document.getElementById('missile-fill');
  fill.style.width = chargePct + '%';
  fill.className = 'missile-bar-fill' + (G.missileReady > 0 ? ' ready' : '');
  const num = document.getElementById('missile-num');
  num.textContent = G.missileReady;
  num.className = 'missile-num' + (G.missileReady === 0 && G.missileCharge === 0 ? ' empty' : '');
  document.getElementById('militia-btn').disabled=G.sp<50||G.phase==='lost'||G.phase==='won';
  document.getElementById('skill-btn').disabled=G.reconCD>0||G.phase==='lost'||G.phase==='won';
  document.getElementById('wave-btn').disabled=G.waveInProgress||G.wave>=50||G.phase==='lost'||G.phase==='won';
}

function showTowerPanel(tower,x,y){
  tpPanel.style.display='block';
  tpPanel.style.left=Math.min(x,canvas.offsetWidth-140)+'px';
  tpPanel.style.top=Math.min(y,canvas.offsetHeight-60)+'px';
  const def=TOWER_TYPES[tower.type];
  const lv=tower.level;
  // Stat helpers
  const dmgNow = tower.dmg;
  const dmgNext = def.dmg[lv+1]!==undefined ? def.dmg[lv+1] : null;
  const rangeNow = tower.range;
  const rangeNext = def.range[lv+1]!==undefined ? def.range[lv+1] : null;
  const cdNow = tower.cd;
  const cdNext = def.cd[lv+1]!==undefined ? def.cd[lv+1] : null;
  function statRow(label,now,next){
    if(next!==null) return `<div class="tp-stat-row"><span class="tp-stat-label">${label}</span><span class="tp-stat-val">${now}</span><span class="tp-stat-arrow">→</span><span class="tp-stat-next">${next}</span></div>`;
    return `<div class="tp-stat-row"><span class="tp-stat-label">${label}</span><span class="tp-stat-val" style="color:#f5c542">${now}</span><span class="tp-stat-arrow"></span></div>`;
  }
  let html=`<div class="tp-name">${def.name}</div><div class="tp-lv">Lv.${lv+1}${lv>=3?' ★MAX':''}</div>`;
  html+= statRow('伤害',dmgNow,dmgNext);
  if(tower.dmgAir!==tower.dmg) html+= statRow('对空',tower.dmgAir,def.dmgAir&&def.dmgAir[lv+1]!==undefined?def.dmgAir[lv+1]:null);
  html+= statRow('范围',rangeNow,rangeNext);
  html+= statRow('射速('+(cdNow/60).toFixed(1)+'s)',cdNow+'帧',cdNext!==null?cdNext+'帧':null);
  if(tower.level<3){
    const cost=tower.upgradeCosts[tower.level];
    const canAfford=G.gold>=cost;
    html+=`<div style="margin-top:4px"><button class="tp-btn upgrade" data-action="upgrade" ${canAfford?'':'disabled style="opacity:0.4;cursor:not-allowed"'}>⬆ 升级 $${cost}</button></div>`;
    if(!canAfford) html+=`<div style="color:#e85555;font-size:10px;margin-top:2px">资金不足！</div>`;
  }
  const refund=Math.floor((tower.cost+tower.totalUpgradeCost)*tower.sellRatio);
  html+=`<button class="tp-btn sell" data-action="sell">💰 出售 +$${refund}</button>`;
  html+=`<button class="tp-btn" data-action="close">✕ 关闭</button>`;
  tpPanel.innerHTML=html;
  tpPanel.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick=(e)=>{
      const act=btn.dataset.action;
      if(act==='upgrade'){
        if(btn.dataset.confirm){
          btn.dataset.confirm='';
          upgradeTower(tower);
        }else{
          btn.dataset.confirm='1';
          btn.textContent='⚠ 确认升级？';
          btn.style.borderColor='#e85555';
          btn.style.color='#e85555';
          setTimeout(()=>{
            if(btn.dataset.confirm){
              btn.dataset.confirm='';
              const cost=tower.upgradeCosts[tower.level];
              const canAfford=G.gold>=cost;
              btn.textContent='⬆ 升级 $'+cost;
              btn.style.borderColor=canAfford?'#5a4a1e':'#3a3a5e';
              btn.style.color=canAfford?'#f5c542':'#665';
            }
          },3000);
        }
      }
      else if(act==='sell'){
        if(btn.dataset.confirm){
          btn.dataset.confirm='';
          sellTower(tower);
        }else{
          btn.dataset.confirm='1';
          const oldText=btn.textContent;
          btn.textContent='⚠ 确认出售？';
          btn.style.borderColor='#e85555';
          btn.style.color='#e85555';
          setTimeout(()=>{
            if(btn.dataset.confirm){
              btn.dataset.confirm='';
              btn.innerHTML=oldText;
              btn.style.borderColor='#5a2a2a';
              btn.style.color='#e88080';
            }
          },3000);
        }
      }
      else if(act==='close'){G.selectedTower=null;hideTowerPanel();}
    };
  });
  // 检查面板是否超出底部/右侧，自动翻转到合适位置
  requestAnimationFrame(() => {
    const pr = tpPanel.getBoundingClientRect();
    const cr = canvas.getBoundingClientRect();
    if (pr.bottom > cr.bottom) {
      tpPanel.style.top = Math.max(0, y - pr.height - 10) + 'px';
    }
    if (pr.right > cr.right) {
      tpPanel.style.left = Math.max(0, x - pr.width - 10) + 'px';
    }
  });
}

function hideTowerPanel(){tpPanel.style.display='none';}

function upgradeTower(tower){
  if(tower.level>=3)return;
  const cost=tower.upgradeCosts[tower.level];
  if(G.gold<cost){showToast('资金不足！');return;}
  G.gold-=cost;
  tower.totalUpgradeCost+=cost;
  tower.level++;
  _bgCanvas=null;
  showToast(`⬆ ${tower.name} → Lv.${tower.level+1}`);
  updateHUD();
  showTowerPanel(tower,parseInt(tpPanel.style.left),parseInt(tpPanel.style.top));
}

function sellTower(tower){
  const refund=Math.floor((tower.cost+tower.totalUpgradeCost)*tower.sellRatio);
  G.gold+=refund;
  tower.remove();
  _bgCanvas=null;
  hideTowerPanel();
  showToast(`💰 出售成功 +$${refund}`);
  updateHUD();
}

// ════════════════════════════════════════════
//  Audio System — Web Audio API 程序化音效 & BGM
// ════════════════════════════════════════════
let audioCtx = null;
const SFX = {
  sfxEnabled: true,
  volume: 0.8,
  bgmNode: null,
  bgmGain: null,
  bgmPlaying: false,
};
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function ensureAudio(){
  if(!audioCtx) initAudio();
  if(audioCtx.state === 'suspended') audioCtx.resume();
}
// ── Procedural SFX ──
function sfxClick(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = 900;
  g.gain.setValueAtTime(0.25 * SFX.volume, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.06);
}
function sfxBuild(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.35 * SFX.volume, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}
function sfxShoot(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  const bufSize = audioCtx.sampleRate * 0.06;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/bufSize, 2);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.22 * SFX.volume, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  src.connect(g).connect(audioCtx.destination);
  src.start();
}
function sfxExplode(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  const bufSize = audioCtx.sampleRate * 0.3;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/bufSize, 0.5);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.25 * SFX.volume, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  // Low rumble
  const o = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  o.type = 'sawtooth'; o.frequency.value = 60;
  og.gain.setValueAtTime(0.25 * SFX.volume, audioCtx.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  src.connect(g).connect(audioCtx.destination);
  o.connect(og).connect(audioCtx.destination);
  src.start();
  o.start(); o.stop(audioCtx.currentTime + 0.25);
}
function sfxWaveStart(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  [0,0.15].forEach((delay,i)=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = i===0 ? 440 : 660;
    g.gain.setValueAtTime(0.15 * SFX.volume, audioCtx.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.2);
    o.connect(g).connect(audioCtx.destination);
    o.start(audioCtx.currentTime + delay);
    o.stop(audioCtx.currentTime + delay + 0.2);
  });
}
function sfxGameOver(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  [800,600,400,200].forEach((freq,i)=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.18 * SFX.volume, audioCtx.currentTime + i*0.18);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.18 + 0.3);
    o.connect(g).connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i*0.18);
    o.stop(audioCtx.currentTime + i*0.18 + 0.3);
  });
}
function sfxVictory(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  [400,500,600,800,1000,1200,1500].forEach((freq,i)=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.22 * SFX.volume, audioCtx.currentTime + i*0.1);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.1 + 0.35);
    o.connect(g).connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i*0.1);
    o.stop(audioCtx.currentTime + i*0.1 + 0.35);
  });
}
function sfxCoin(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(1200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(2400, audioCtx.currentTime + 0.1);
  g.gain.setValueAtTime(0.2 * SFX.volume, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}
// ════════════════════════════════════════════
//  New SFX: 炸塔、导弹爆炸、无人机杀敌、民兵杀敌
// ════════════════════════════════════════════
function sfxTowerDestroy(){
  if(!SFX.sfxEnabled) return;
  ensureAudio();
  // Crashing metallic boom
  const bufSize = audioCtx.sampleRate * 0.5;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){
    const t = i/bufSize;
    const noise = (Math.random()*2-1) * Math.pow(1-t, 0.6);
    const metal = Math.sin(i*0.05) * Math.pow(1-t, 0.8) * 0.4;
    d[i] = (noise + metal) * 0.5;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.55 * SFX.volume, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  src.connect(g).connect(audioCtx.destination);
  src.start();
  // Deep low rumble
  const o = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(80, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);

function sfxMissileHit(){
  if(!SFX.sfxEnabled) return;

  for(let i=0;i<bufSize;i++){

  // 尾奏
  const coda = [

    [523.3, 5.0, 0.5, 0.12], [587.3, 5.5, 0.5, 0.13],
    [659.3, 6.0, 1.0, 0.15],
    [261.6, 7.0, 1.0, 0.10],
  ];

  const sections = [

    ['B', themeB, 4],          // 64拍 副歌再现
    ['E', themeE, 4],          // 64拍 渐强

  function playPattern(pattern, repeatCount){
    for(let rep = 0; rep < repeatCount; rep++){
      const repOff = rep * 8;
      for(const [freq, beat, dur, vel] of pattern){
        const startT = audioCtx.currentTime + (repOff + beat) * beatSec;
        const durT = dur * beatSec;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'triangle';
        o.frequency.value = freq;
        const velAdj = vel * (0.9 + Math.random() * 0.2);

        g.gain.linearRampToValueAtTime(velAdj, startT + 0.02);
        g.gain.setValueAtTime(velAdj, startT + durT * 0.6);
        g.gain.exponentialRampToValueAtTime(0.001, startT + durT);
        o.connect(g).connect(masterGain);
        o.start(startT);
        o.stop(startT + durT + 0.01);
      }
    }
  }

  // 调度所有段落
  let scheduleOffset = 0;
  for(const [name, pattern, repeat] of sections){
    const gap = scheduleOffset;
    if(pattern.length > 0){
      setTimeout(() => {
        if(SFX.bgmPlaying) playPattern(pattern, repeat);
      }, gap * beatSec * 1000);
    }
    scheduleOffset += repeat * 8;
    if(name !== sections[sections.length-1][0]){
      scheduleOffset += 2;
    }
  }

  const totalBeats = scheduleOffset + 8;
  const totalMs = totalBeats * beatSec * 1000;

function sfxStopBGM(){
  SFX.bgmPlaying = false;
  if(SFX.bgmNode){
    try{
      SFX.bgmNode.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      setTimeout(() => {
        try{
          SFX.bgmNode.masterGain.disconnect();
          if(SFX.bgmNode.bass) SFX.bgmNode.bass.stop();
        }catch(e){}
      }, 500);
    }catch(e){}
    SFX.bgmNode = null;
  }
}
function sfxToggle(toggleId, key){
  const el = document.getElementById(toggleId);
  if(!el) return;
  el.addEventListener('click', ()=>{
    SFX[key] = !SFX[key];
    el.classList.toggle('on', SFX[key]);
    if(key === 'sfxEnabled'){
      if(SFX[key]) sfxPlayBGM();
      else sfxStopBGM();
    }
  });
}
function sfxVolume(elId, numId){
  const el = document.getElementById(elId);
  const num = document.getElementById(numId);
  if(!el || !num) return;
  el.addEventListener('input', ()=>{
    const v = parseFloat(el.value) / 100;
    SFX.volume = v;
    num.textContent = Math.round(v * 100) + '%';
    if(SFX.bgmNode && SFX.bgmNode.masterGain){
      SFX.bgmNode.masterGain.gain.value = v * 0.35;
    }
  });
}

  ensureAudio();

  if(!settingsOverlay){

// ── Save/Load ──
const SAVE_KEY = 'persian_guard_save';
function saveGame(){
  try{
    const data = {
      gold: G.gold,
      coreHP: G.coreHP, maxCoreHP: G.maxCoreHP,
      wave: G.wave,
      sp: G.sp,
      phase: G.phase,
      missileCharge: G.missileCharge,
      missileReady: G.missileReady,
      goldEarned: G.goldEarned,
      kills: G.kills,
      towers: G.towers.map(t=>({slotIdx:t.slotIdx, type:t.type, level:t.level, totalUpgradeCost:t.totalUpgradeCost})),
      bases: JSON.parse(JSON.stringify(G.bases)),
      waveInProgress: G.waveInProgress,
      allSpawned: G.allSpawned,
      spawnQueue: [],  // 不保存进行中波次的生成队列，加载后重新开始波次
      spawnIndex: 0,
      spawnTimer: 0,
      version: 1,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showToast('💾 游戏已保存');
    sfxCoin();
  }catch(e){
    showToast('⚠ 保存失败: '+e.message);
  }
}
function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw){ showToast('⚠ 没有存档'); return; }
    const data = JSON.parse(raw);
    if(!data.version){ showToast('⚠ 存档版本不兼容'); return; }
    // 停止BGM
    sfxStopBGM();
    // 清空所有活动对象
    G.enemies = [];
    G.projs = [];
    G.particles = [];
    G.reconDrones = [];
    G.bombardMissiles = [];
    G.tehranMissiles = [];
    G.towers = [];
    G.selectedTower = null;
    G.pendingType = -1;
    G._confirmExit = false;
    // 恢复基本状态
    G.gold = data.gold;
    G.coreHP = data.coreHP;
    G.maxCoreHP = data.maxCoreHP;
    G.wave = data.wave;
    G.sp = data.sp;
    G.phase = data.phase;
    G.missileCharge = data.missileCharge || 0;
    G.missileReady = data.missileReady || 0;
    G.goldEarned = data.goldEarned || 0;
    G.kills = data.kills || 0;
    G.waveInProgress = false;
    G.allSpawned = false;
    G.spawnQueue = [];
    G.spawnIndex = 0;
    G.spawnTimer = 0;
    G.bases = data.bases;
    // 重建阵位和炮塔
    initSlots();
    for(const td of data.towers){
      if(td.slotIdx !== undefined && td.slotIdx < G.slots.length && !G.slots[td.slotIdx].occupied){
        G.slots[td.slotIdx].occupied = true;
        const twr = new Tower(td.slotIdx, td.type);
        twr.level = td.level || 0;
        twr.totalUpgradeCost = td.totalUpgradeCost || 0;
        G.towers.push(twr);
      }
    }
    // 更新UI
    hideTowerPanel();
    hideOverlay();
    updateHUD();
    const wb = document.getElementById('wave-btn');
    if(data.phase === 'lost' || data.phase === 'won'){
      wb.disabled = true;
      if(data.phase === 'won'){
        showOverlay('🎉 胜利！','已加载胜利存档<br>击杀: '+data.kills+' | 总收益: $'+data.goldEarned,()=>{hideOverlay();});
      }else{
        showOverlay('💀 失守！','已加载失败存档',()=>{hideOverlay();});
      }
    }else{
      wb.disabled = data.waveInProgress || data.wave >= 50;
    }
    showToast('📂 存档已读取');
    sfxCoin();
  }catch(e){
    showToast('⚠ 读取失败: '+e.message);
  }
}
