  });
  canvas.addEventListener('mousemove',(e)=>{
    const rect=canvas.getBoundingClientRect();
    G.cursorX=(e.clientX-rect.left)*(canvas.width/rect.width);
    G.cursorY=(e.clientY-rect.top)*(canvas.height/rect.height);
  });
  canvas.addEventListener('mouseleave',()=>{G.cursorX=-999;G.cursorY=-999;});
  canvas.addEventListener('contextmenu',(e)=>{
    e.preventDefault();
    // 放置模式下右键 = 取消放置
    if(G.pendingType>=0){
      G.pendingType=-1;
      document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
      return;
    }
    const rect=canvas.getBoundingClientRect();
    const sx=(e.clientX-rect.left)*(canvas.width/rect.width);
    const sy=(e.clientY-rect.top)*(canvas.height/rect.height);
    // Sell on right-click
    for(const t of G.towers){
      if(dist({x:sx,y:sy},t)<22){
        // 右键双击同一炮塔 → 出售
        const now=Date.now();
        if(G._lastRightClickTower===t && now-G._lastRightClickTime<350){
          G._lastRightClickTower=null;
          G._lastRightClickTime=0;
          sellTower(t);
        }else{
          G._lastRightClickTower=t;
          G._lastRightClickTime=now;
          showToast(`右键双击出售 ${t.name}`);
        }
        return;
      }
    }
    G.pendingType=-1;
    document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  });
  // Tower buttons
  document.querySelectorAll('.tower-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.tower);
      if(G.pendingType===idx){
        G.pendingType=-1;
        btn.classList.remove('selected');
        return;
      }
      if(G.phase==='lost'||G.phase==='won')return;
      const def=TOWER_TYPES[idx];
      if(G.gold<def.cost){showToast('资金不足！');return;}
      G.pendingType=idx;
      document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      hideTowerPanel();
    });
  });
  // Wave button
  document.getElementById('wave-btn').addEventListener('click',startWave);
  // Militia
  document.getElementById('militia-btn').addEventListener('click',summonMilitia);
  // Recon skill
  document.getElementById('skill-btn').addEventListener('click',useRecon);
  // 购买飞弹：点击导弹栏，$1000买1发
  document.querySelector('.missile-bar-wrap').addEventListener('click',()=>{
    if(G.gold>=1000 && G.phase!=='lost' && G.phase!=='won'){
      G.gold-=1000; G.missileReady++;
      updateHUD();
      showToast('💵 购买飞弹 +1');
    }
  });
  // Keyboard
  document.addEventListener('keydown',(e)=>{
    if(e.key==='1')document.querySelector('[data-tower="0"]').click();
    else if(e.key==='2')document.querySelector('[data-tower="1"]').click();
    else if(e.key==='3')document.querySelector('[data-tower="2"]').click();
    else if(e.key==='4')document.querySelector('[data-tower="3"]').click();
    else if(e.key===' '||e.key==='Enter'){e.preventDefault();if(!document.getElementById('wave-btn').disabled)startWave();}
    else if(e.key==='Escape'){
      // 设置面板打开 → 关闭
      if(settingsPanel && settingsPanel.classList.contains('show')){
        closeSettings();
        return;
      }
      // 有选中炮塔/放置模式 → 取消
      if(G.selectedTower||G.pendingType>=0){
        G.pendingType=-1;G.selectedTower=null;
        document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
        hideTowerPanel();
        return;
      }
      // 游戏中 → 确认退出
      if(G.wave>0 && G.phase!=='won' && G.phase!=='lost'){
        if(G._confirmExit){
          restartGame();
          G._confirmExit=false;
        }else{
          G._confirmExit=true;
          showOverlay('确认退出？','当前游戏进度将丢失，是否重新开始？',()=>{
            G._confirmExit=false;
            restartGame();
          });
          // 在覆盖层上加个继续按钮
          const contBtn=document.createElement('button');
          contBtn.textContent='继续游戏';
          contBtn.style.marginLeft='12px';
          contBtn.style.borderColor='#2a6a3e';
          contBtn.style.background='#1e4a2e';
          contBtn.style.border='1px solid #3a8a4e';
          contBtn.onclick=()=>{G._confirmExit=false;hideOverlay();};
          olBtn.parentNode.insertBefore(contBtn,olBtn.nextSibling);
        }
        return;
      }
    }
    else if(e.key==='r'||e.key==='R')useRecon();
    else if(e.key==='m'||e.key==='M')summonMilitia();
  });
  // 页面关闭/刷新时确认
  window.addEventListener('beforeunload',(e)=>{
    if(G.wave>0 && G.phase!=='won' && G.phase!=='lost'){
      e.preventDefault();
      e.returnValue='';
    }
  });
  // 鼠标前进/后退按钮 → 确认离开
  window.addEventListener('popstate',(e)=>{
    if(G.wave>0 && G.phase!=='won' && G.phase!=='lost'){
      // 先推回历史状态，防止页面离开
      history.pushState(null, '');
      // 弹出确认
      showOverlay('确认离开？','游戏进行中，离开将丢失当前进度。',()=>{
        // 用户确认，关闭游戏
        G._confirmExit=false;
        hideOverlay();
        // 让页面自然导航离开
        window.location.href='about:blank';
      });
      // 继续游戏按钮
      const contBtn=document.createElement('button');
      contBtn.textContent='继续游戏';
      contBtn.style.marginLeft='12px';
      contBtn.style.borderColor='#2a6a3e';
      contBtn.style.background='#1a3a2a';
      contBtn.onclick=()=>{G._confirmExit=false;hideOverlay();};
      olBtn.parentNode.insertBefore(contBtn,olBtn.nextSibling);
    }
  });
  // 开局时推一个历史状态，让鼠标后退也能被拦截
  document.getElementById('wave-btn').addEventListener('click',()=>{
    if(G.wave===0) history.pushState(null, '');
  });
}

function handleClick(sx,sy){
  // Check enemy base click (德黑兰反击飞弹 — 攻击基地)
  for(const bp of BASE_POSITIONS){
    if(dist({x:sx,y:sy},bp) < 30 && (G.bases[bp.dir]?.hp||0) > 0){
      const canFire = G.missileReady > 0 || G.gold >= 1000;
      if(canFire){
        if(G.missileReady <= 0){ G.gold -= 1000; showToast('💵 花费$1000购买飞弹'); }
        fireTehranMissile(bp);
        return;
      }
    }
  }
  // Check tower click (select)
  for(const t of G.towers){
    if(dist({x:sx,y:sy},t)<20){
      // 双击同一炮塔 → 升级
      const now=Date.now();
      if(G._lastClickTower===t && now-G._lastClickTime<350){
        G._lastClickTower=null;
        G._lastClickTime=0;
        if(t.level<3){
          const cost=t.upgradeCosts[t.level];
          if(G.gold>=cost){
            G.gold-=cost;
            t.totalUpgradeCost+=cost;
            t.level++;
            showToast(`⬆ ${t.name} → Lv.${t.level+1}`);
            updateHUD();
          }else{
            showToast('资金不足！');
          }
        }else{
          showToast(`${t.name} 已达最高等级`);
        }
        return;
      }
      G._lastClickTower=t;
      G._lastClickTime=now;
      G.selectedTower=t;
      showTowerPanel(t,sx+10,sy-30);
      G.pendingType=-1;
      document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
      return;
    }
  }
  // Check slot click (build)
  if(G.pendingType>=0){
    let nearest=null,nearDist=30;
    for(let i=0;i<G.slots.length;i++){
      const s=G.slots[i];
      if(s.occupied)continue;
      const d=dist({x:sx,y:sy},s);
      if(d<nearDist){nearDist=d;nearest=i;}
    }
    if(nearest!==null){
      const built=buildTower(nearest,G.pendingType);
      if(!built){
        G.pendingType=-1;
        document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
      }
    } else {
      G.pendingType=-1;
      document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
    }
    return;
  }
  // 战术飞弹打击：点击空白处 → 有飞弹免费打，没飞弹扣$1000买
  const canFire = G.missileReady > 0 || G.gold >= 1000;
  if(canFire && G.phase !== 'lost' && G.phase !== 'won'){
    if(G.missileReady <= 0){ G.gold -= 1000; showToast('💵 花费$1000购买飞弹'); }
    fireTacticalMissile(sx, sy);
    return;
  }
  // Deselect
  G.selectedTower=null;
  hideTowerPanel();
}

function buildTower(slotIdx,type){
  const def=TOWER_TYPES[type];
  if(G.gold<def.cost){showToast('资金不足！');return false;}
  if(G.slots[slotIdx].occupied){showToast('该位置已被占用');return false;}
  G.slots[slotIdx].occupied=true;
  G.gold-=def.cost;
  const tower=new Tower(slotIdx,type);
  G.towers.push(tower);
  _bgCanvas=null;
  showToast(`✅ ${def.name} 已建造`);
  sfxBuild();
  updateHUD();
  return true;
}

// 德黑兰反击飞弹
function fireTehranMissile(base){
  G.missileReady--;
  const m = {
    x: CORE_X, y: CORE_Y,
    targetX: base.x, targetY: base.y,
    targetDir: base.dir,
    speed: 7,
    alive: true,
    trail: [],
  };
  G.tehranMissiles.push(m);
  showToast(`🚀 反击！飞弹飞向${base.dir}方基地`);
  updateHUD();
}

// 战术飞弹打击：向指定位置发射飞弹，造成范围伤害
function fireTacticalMissile(tx, ty){
  G.missileReady--;
  const m = {
    x: CORE_X, y: CORE_Y,
    targetX: tx, targetY: ty,
    speed: 7,
    alive: true,
    trail: [],
    tactical: true,  // 标记为战术打击
    aoeRadius: 80,   // 爆炸范围
    aoeDamage: 150,  // 范围伤害（提升至150，圆心重创大飞机过半）
  };
  G.tehranMissiles.push(m);
  showToast(`🚀 战术飞弹发射！目标(${Math.round(tx)},${Math.round(ty)})`);
  updateHUD();
}

// ---- Game Loop ----
let _bgCanvas = null; // offscreen canvas for static map

function update(dt){
  G.frame++;
  // CD timers
  if(G.reconCD>0){G.reconCD-=dt*60;if(G.reconCD<0)G.reconCD=0;}
  // Global jammer slow aura (single pass — was O(jammers×enemies), now O(enemies+jammers))
  for(const e of G.enemies){
    if(!e.alive||e.friendly)continue;
    let bestSlow=0,bestJammer=null;
    for(const t of G.towers){
      if(t._removePending||t.type!==2||t.slow<=0)continue;
      if(distSq(t,e)<=t.range*t.range){
        if(t.slow>bestSlow){bestSlow=t.slow;bestJammer=t;}
      }
    }
    if(bestJammer){
      e.slowTimer=15;
      e.slowAmount=Math.max(e.slowAmount||0,bestSlow);
      if(e.stealth&&!e.revealed)e.revealed=true;
    }
  }
  // Update towers
  for(const t of G.towers){
    if(t._removePending) continue;
    t.update(dt);
  }
  // Cleanup removed towers
  compactAlive(G.towers,t=>!t._removePending);
  if(G.selectedTower && G.selectedTower._removePending){
    G.selectedTower = null;
    hideTowerPanel();
  }
  // Update enemies
  for(const e of G.enemies){
    e.update(dt);
    if(e.reachedEnd){
      e.alive=false;
      if(!e.friendly)damageCore(e.suicide?2:1);
    }
  }
  // Friendly unit collision: militia rams GROUND enemies (self-destruct / one-hit-kill) — frame-skipped 2/3
  if(G.frame%3===0){
    for(const e of G.enemies){
      if(!e.alive||!e.friendly)continue;
      for(const t of G.enemies){
        if(!t.alive||t.friendly||t===e)continue;
        if(t.flying) continue;
        const hit=e.size+t.size+5;
        if(distSq(e,t)<hit*hit){
          killEnemy(t);
          e.alive=false;
          sfxMilitiaKill();
          emitBurst(e.x,e.y,6,'#ff8833',3,8,0.5,40,160);
          break;
        }
      }
    }
  }
  // Update projectiles
  for(const p of G.projs)p.update(dt);
  // Update recon drones
  for(const rd of G.reconDrones)rd.update(dt);
  // Update bombard missiles
  for(const m of G.bombardMissiles){
    if(!m.alive)continue;
    const dx=m.targetX-m.x, dy=m.targetY-m.y;
    const arrive=m.speed+5;
    const dSq=dx*dx+dy*dy;
    if(dSq<arrive*arrive){
      m.alive=false;
      const tower=m.targetTower;
      if(tower&&!tower._removePending){
        emitBurst(tower.x,tower.y,8,'#ff4422',4,10,0.8,50,200);
        tower.remove();
        _bgCanvas=null;
        sfxTowerDestroy();
        showToast(`💥 炮塔被导弹摧毁！`);
      }
    }else{
      if(G.frame%2===0)m.trail.push({x:m.x,y:m.y,life:.3});
      if(m.trail.length>5)m.trail.shift();
      const d=Math.sqrt(dSq);
      m.x+=(dx/d)*m.speed;
      m.y+=(dy/d)*m.speed;
    }
  }
  // Update Tehran missiles (反击飞弹)
  for(const m of G.tehranMissiles){
    if(!m.alive)continue;
    const dx=m.targetX-m.x, dy=m.targetY-m.y;
    const arrive=m.speed+5;
    const dSq=dx*dx+dy*dy;
    if(dSq<arrive*arrive){
      m.alive=false;
      if(m.tactical){
        // 战术打击：范围爆炸伤害
        let hitCount = 0;
        const aoeSq=m.aoeRadius*m.aoeRadius;
        for(const e of G.enemies){
          if(!e.alive) continue;
          const ex=e.x-m.targetX, ey=e.y-m.targetY;
          const edSq=ex*ex+ey*ey;
          if(edSq <= aoeSq){
            const ed=Math.sqrt(edSq);
            const dmgMult = 1 - (ed / m.aoeRadius) * 0.5; // 中心100%，边缘50%
            const dmg = Math.round(m.aoeDamage * dmgMult * (1 - (e.armor||0)));
            e.hp -= dmg;
            e.hitFlash = 8;
            if(e.hp <= 0) killEnemy(e);
            hitCount++;
          }
        }
        // 爆炸粒子
        sfxMissileHit();
        emitBurst(m.targetX,m.targetY,12,'#ffcc44',6,14,0.8,80,300);
        emitBurst(m.targetX,m.targetY,8,'#ff8844',4,10,0.6,40,200);
        // 冲击波环
        emitParticle(m.targetX,m.targetY,0,0,0.5,'#ffcc44',1,{shockwave:true,waveRadius:m.aoeRadius});
        showToast(`💥 战术飞弹命中！击中${hitCount}个敌人`);
      }else{
        // 基地打击
        const dir=m.targetDir;
        G.bases[dir].hp--;
        G.bases[dir].wavesSinceHit = 0;
        // Explosion
        sfxMissileHit();
        const col=G.bases[dir].hp<=0?'#888':'#ffaa44';
        emitBurst(m.targetX,m.targetY,10,col,5,14,0.9,60,250);
        if(G.bases[dir].hp<=0){
          showToast(`💥 ${dir}方基地被彻底摧毁！`);
        }else{
          showToast(`💥 ${dir}方基地受损 (${G.bases[dir].hp}/${G.bases[dir].maxHp})`);
        }
      }
    }else{
      if(G.frame%2===0)m.trail.push({x:m.x,y:m.y,life:.4});
      if(m.trail.length>6)m.trail.shift();
      const d=Math.sqrt(dSq);
      m.x+=(dx/d)*m.speed;
      m.y+=(dy/d)*m.speed;
    }
  }
  // Update particles
  for(const p of G.particles){
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vy+=60*dt;
    p.life-=dt;
  }
  // Cleanup
  compactAlive(G.enemies,e=>e.alive);
  compactAlive(G.projs,p=>p.alive);
  compactAlive(G.reconDrones,rd=>rd.alive);
  compactAlive(G.bombardMissiles,m=>m.alive);
  compactAlive(G.tehranMissiles,m=>m.alive);
  compactAlive(G.particles,p=>p.life>0);
  // Hard cap particles at 200 — prevents slowdown from explosion spam
  if(G.particles.length>200)G.particles.splice(0,G.particles.length-200);
  // Wave
  updateWave(dt);
  // HUD update rate
  if(G.frame%5===0)updateHUD();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Map — use offscreen canvas, only redraw when towers change (static background)
  if(!_bgCanvas){
    _bgCanvas=document.createElement('canvas');
    _bgCanvas.width=W;_bgCanvas.height=H;
    const bgCtx=_bgCanvas.getContext('2d');
    drawMap(bgCtx);
  }
  ctx.drawImage(_bgCanvas,0,0);
  // Tower slots — dynamic, not cached
  const isPlacing = G.pendingType >= 0;
  for(const slot of G.slots){
    const occ=slot.occupied;
    if(occ){
      ctx.fillStyle='rgba(60,60,140,0.04)';
      ctx.strokeStyle='rgba(80,80,180,0.05)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(slot.x-12,slot.y-12,24,24,4);ctx.fill();ctx.stroke();
    }else if(isPlacing){
      // Building mode: highlight empty slots
      const pulse = 0.5 + 0.15 * Math.sin(G.frame * 0.04 + slot.x * 0.01);
      ctx.strokeStyle=`rgba(245,197,66,${0.5+0.3*Math.sin(G.frame*0.06)})`;
      ctx.lineWidth=2;
      ctx.fillStyle=`rgba(245,197,66,${0.15*pulse})`;
      ctx.beginPath();ctx.roundRect(slot.x-12,slot.y-12,24,24,4);ctx.fill();ctx.stroke();
    }
    // Default: don't draw empty slots at all — clean map
  }
  // 美军基地 — dynamic, not cached (HP changes in real-time)
  const baseColors = {
    '西': { fill:'#3a6ea5', light:'#5a9ed5', dark:'#1a3e65', label:'西·海军' },
    '东': { fill:'#c0392b', light:'#e0695b', dark:'#7a1a12', label:'东·陆军' },
    '北': { fill:'#2d8a46', light:'#4aba6a', dark:'#1a4a26', label:'北·空军' },
    '南': { fill:'#b88a0b', light:'#e8ba3b', dark:'#6a4a05', label:'南·指挥部' },
  };
  for(const bp of BASE_POSITIONS){
    const baseData = G.bases[bp.dir] || {hp:0, maxHp:4};
    const col = baseColors[bp.dir];
    const destroyed = baseData.hp <= 0;
    const pulse = destroyed ? 0 : (0.85 + 0.15 * Math.sin(G.frame * 0.025 + bp.x));
    const dCol = destroyed
      ? { fill:'#555', light:'#777', dark:'#333', label:col.label.replace(/(·.*)/,'·废墟') }
      : col;
    ctx.save();
    ctx.translate(bp.x, bp.y);
    const toCenter = Math.atan2(360 - bp.y, 600 - bp.x);
    ctx.rotate(toCenter);
    if(!destroyed){
      ctx.shadowColor = dCol.light;
      ctx.shadowBlur = 18 * pulse;
    }
    ctx.fillStyle = dCol.dark;
    ctx.strokeStyle = dCol.light;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(-14, -10, 28, 20);
    ctx.fill(); ctx.stroke();
    if(destroyed){
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(12,8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-12,8); ctx.lineTo(12,-8); ctx.stroke();
    }else{
      ctx.fillStyle = dCol.fill;
      ctx.beginPath();
      ctx.rect(-6, -6, 12, 14);
      ctx.fill();
      ctx.fillStyle = dCol.light;
      ctx.shadowBlur = 10;
      ctx.fillRect(4, -2.5, 16, 5);
      ctx.fillRect(-8, -2.5, 6, 5);
      ctx.fillStyle = dCol.light;
      ctx.beginPath(); ctx.arc(0, -3, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff6';
      ctx.beginPath(); ctx.arc(0, -5, 2, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      const hpR = baseData.hp / baseData.maxHp;
      const barW = 24, barH = 3;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(-barW/2-1, 11, barW+2, barH+2);
      ctx.fillStyle = hpR > 0.66 ? '#44cc44' : hpR > 0.33 ? '#ddcc44' : '#ee4444';
      if (hpR > 0.01) ctx.fillRect(-barW/2, 12, barW * hpR, barH);
    }
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.fillStyle = destroyed ? '#777' : dCol.light;
    ctx.font = `bold ${destroyed?'9':'10'}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const labelY = bp.dir === '北' ? bp.y + 24 : bp.y - 24;
    ctx.fillText(dCol.label, bp.x, labelY);
    ctx.fillStyle = destroyed ? '#666' : col.fill;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const flagY = bp.dir === '北' ? bp.y + 26 : bp.y - 26;
    ctx.fillText(destroyed ? '✕' : '⚑', bp.x, flagY);
  }
  // Enemies
  for(const e of G.enemies)e.draw(ctx);
  // Recon drones
  for(const rd of G.reconDrones)rd.draw(ctx);
  // Bombard missiles
  for(const m of G.bombardMissiles){
    if(!m.alive)continue;
    if(m.trail.length>1){
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.shadowColor='#ff4a2a'; ctx.shadowBlur=8;
      ctx.strokeStyle='rgba(255,74,42,0.20)';
      ctx.lineWidth=3.4;
      ctx.beginPath(); ctx.moveTo(m.trail[0].x,m.trail[0].y);
      for(let i=1;i<m.trail.length;i++)ctx.lineTo(m.trail[i].x,m.trail[i].y);
      ctx.lineTo(m.x,m.y); ctx.stroke();
      ctx.strokeStyle='rgba(255,220,160,0.24)';
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.restore();
    }
    ctx.shadowColor='#ff4422';ctx.shadowBlur=9;
    ctx.fillStyle='#ff5a34';
    ctx.beginPath();ctx.arc(m.x,m.y,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,245,210,0.9)';
    ctx.beginPath();ctx.arc(m.x-1,m.y-1,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  // Tehran missiles (反击飞弹 — 金色尾焰)
  for(const m of G.tehranMissiles){
    if(!m.alive)continue;
    if(m.trail.length>1){
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.shadowColor=m.tactical?'#ffcc44':'#86d7ff';
      ctx.shadowBlur=9;
      ctx.strokeStyle=m.tactical?'rgba(255,202,68,0.22)':'rgba(110,210,255,0.18)';
      ctx.lineWidth=m.tactical?3.6:3;
      ctx.beginPath(); ctx.moveTo(m.trail[0].x,m.trail[0].y);
      for(let i=1;i<m.trail.length;i++)ctx.lineTo(m.trail[i].x,m.trail[i].y);
      ctx.lineTo(m.x,m.y); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,230,0.25)';
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.restore();
    }
    ctx.shadowColor=m.tactical?'#ffcc44':'#86d7ff';ctx.shadowBlur=10;
    ctx.fillStyle=m.tactical?'#ffcc44':'#8bdcff';
    ctx.beginPath();ctx.arc(m.x,m.y,m.tactical?6:5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,235,0.9)';
    ctx.beginPath();ctx.arc(m.x-1,m.y-1,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  // Towers
  for(const t of G.towers)t.draw(ctx);
  // Projectiles
  for(const p of G.projs)p.draw(ctx);
  // Particles — batch by brightness for performance
  ctx.shadowBlur=0;
  for(const p of G.particles){
    if(p.shockwave){
      const t = 1 - p.life / 0.5;
      const r = p.waveRadius * t;
      ctx.strokeStyle = `rgba(255,200,68,${0.6*(1-t)})`;
      ctx.lineWidth = 3 - t * 2.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
      continue;
    }
    const alpha=Math.max(0,p.life/(p.life+dt||0.5));
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*Math.max(0.1,alpha),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Pending build indicator
  if(G.pendingType>=0){
    ctx.fillStyle='rgba(245,197,66,0.6)';
    ctx.font='14px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('点击塔位建造',W/2,30);
  }
  // 飞弹就绪提示
  if(G.missileReady > 0 && G.phase !== 'lost' && G.phase !== 'won'){
    ctx.fillStyle=`rgba(255,100,50,${0.3+0.3*Math.sin(G.frame*0.05)})`;
    ctx.font='bold 16px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('🚀 点击地面发射战术飞弹 | 点击基地发射反击飞弹', W/2, H-40);
    // AoE 范围预览圈
    if(G.cursorX > 0 && G.cursorY > 0){
      const pulse = 0.4 + 0.15 * Math.sin(G.frame * 0.06);
      ctx.strokeStyle = `rgba(255,200,68,${pulse})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 6]);
      ctx.beginPath(); ctx.arc(G.cursorX, G.cursorY, 80, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      // 内圈渐变提示
      const grd = ctx.createRadialGradient(G.cursorX, G.cursorY, 0, G.cursorX, G.cursorY, 80);
      grd.addColorStop(0, 'rgba(255,200,68,0.10)');
      grd.addColorStop(0.5, 'rgba(255,200,68,0.05)');
      grd.addColorStop(1, 'rgba(255,200,68,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(G.cursorX, G.cursorY, 80, 0, Math.PI*2); ctx.fill();
      // 中心十字准星
      ctx.strokeStyle = `rgba(255,200,68,${pulse*0.8})`;
      ctx.lineWidth = 1;
      const cs = 6;
      ctx.beginPath();
      ctx.moveTo(G.cursorX-cs, G.cursorY); ctx.lineTo(G.cursorX+cs, G.cursorY);
      ctx.moveTo(G.cursorX, G.cursorY-cs); ctx.lineTo(G.cursorX, G.cursorY+cs);
      ctx.stroke();
      // 提示提升
      ctx.fillStyle = `rgba(255,200,68,${0.5+0.2*Math.sin(G.frame*0.05)})`;
      ctx.font='11px sans-serif';
      ctx.fillText(`伤害 150 | 范围 80px`, G.cursorX, G.cursorY - 90);
    }
  }
  // Wave button text update
  const waveBtn = document.getElementById('wave-btn');
  if(G.waveInProgress){
    waveBtn.textContent = `⏳ ${G.wave}/50`;
  } else if(G.wave >= 50){
    waveBtn.textContent = '🏁 完成';
  } else if(G.wave === 0){
    waveBtn.textContent = '▶ 开始';
  } else {
    waveBtn.textContent = `▶ 第${G.wave+1}波`;
  }
  // Cooldown indicators on skill button
  const skillBtn=document.getElementById('skill-btn');
  if(G.reconCD>0){
    const sec=Math.ceil(G.reconCD/60);
    skillBtn.innerHTML=`侦察<br>${sec}s`;
  }else{
    skillBtn.innerHTML='侦察<br>无人机';
  }
}

let dt=0,lastTime=0;
function gameLoop(timestamp){
  dt=Math.min(0.05,(timestamp-lastTime)/1000);
  lastTime=timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ---- Init ----
function initGame(){
  G.gold=500;
  G.coreHP=15;
  G.maxCoreHP=15;
  G.wave=0;
  G.sp=0;
  G.phase='idle';
  G.towers=[];
  G.enemies=[];
  G.projs=[];
  G.particles=[];
  G.texts=[];
  G.selectedTower=null;
  G.pendingType=-1;
  G.spawnQueue=[];
  G.spawnIndex=0;
  G.spawnTimer=0;
  G.waveInProgress=false;
  G.allSpawned=false;
  G.reconCD=0;
  G.reconDrones=[];
  G.bombardMissiles=[];
  G.frame=0;
  G.goldEarned=0;
  G.kills=0;
  G.missileCharge=0;
  G.missileReady=0;
  G.tehranMissiles=[];
  G.bases={
    西:{hp:4, maxHp:4, wavesSinceHit:0},
    东:{hp:4, maxHp:4, wavesSinceHit:0},
    北:{hp:4, maxHp:4, wavesSinceHit:0},
    南:{hp:4, maxHp:4, wavesSinceHit:0},
  };
  _bgCanvas=null;
  lastTime=0;
  initSlots();
  hideTowerPanel();
  hideOverlay();
  updateHUD();
  document.getElementById('wave-btn').disabled=true;
  showToast('🏗️ 建造防御塔，抵御入侵！');
  // Auto-enable wave after a short delay
  setTimeout(()=>{
    if(G.phase==='idle')document.getElementById('wave-btn').disabled=false;
  },1000);
}

function init(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  canvas.width=W;
  canvas.height=H;
  tpPanel=document.getElementById('tower-panel');
  toastEl=document.getElementById('toast');
  overlayEl=document.getElementById('overlay');
  olTitle=document.getElementById('ol-title');
  olDesc=document.getElementById('ol-desc');
  olBtn=document.getElementById('ol-btn');
  // 初始化音效
  initAudio();
  // 初始化设置面板
  setupSettings();
  // Polyfill roundRect
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(r>w/2)r=w/2;if(r>h/2)r=h/2;
      this.moveTo(x+r,y);
      this.lineTo(x+w-r,y);
      this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r);
      this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      this.lineTo(x+r,y+h);
      this.quadraticCurveTo(x,y+h,x,y+h-r);
      this.lineTo(x,y+r);
      this.quadraticCurveTo(x,y,x+r,y);
    };
  }
  setupInput();
  initGame();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('DOMContentLoaded',init);
</script>
